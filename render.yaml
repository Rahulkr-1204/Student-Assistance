services:
  - type: web
    name: student-assistance-backend
    runtime: python
    rootDir: student-support-backend
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

  - type: web
    name: student-assistance-frontend
    runtime: static
    rootDir: student-support-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
